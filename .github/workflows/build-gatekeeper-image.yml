name: Build & publish combined image

# Builds the COMBINED container (Node gatekeeper + Python IP-asset service), SMOKE-TESTS it (starts
# the container and asserts BOTH halves come up), and only then pushes it to GitHub Container
# Registry (ghcr.io) — and, when GCP Workload Identity Federation is configured, ALSO to Google
# Artifact Registry so Cloud Run can pull it directly. No service-account keys: auth uses GitHub's
# OIDC token via WIF. Publishing is GATED on the smoke test (`needs: smoke-test`), so a broken image
# never ships :latest. On pull_request the smoke test runs but publishing is skipped.
#
# Enable the Artifact Registry push (one time): run `deploy/setup-wif.sh`, then set these repo
# Variables (Settings → Secrets and variables → Actions → Variables) — all non-secret identifiers:
#   GCP_WIF_PROVIDER  projects/NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
#   GCP_DEPLOY_SA     image-pusher service-account email
#   GCP_PROJECT       project id
#   GCP_AR_REGION     e.g. us-central1
#   GCP_AR_REPO       Artifact Registry repo (e.g. lsl)
# If GCP_WIF_PROVIDER is unset, the AR steps are skipped and only GHCR is pushed.
#
# NOTE: GitHub applies the `paths` filter to tag pushes too, so a release tag on a commit that did NOT
# touch these paths can be skipped. For a guaranteed build of a specific ref, use "Run workflow"
# (workflow_dispatch). First GHCR push creates a private package — make it public / grant pull access
# in the org Packages settings if it must be pulled without auth.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/gatekeeper.mjs'
      - 'deploy/entrypoint.sh'
      - 'asset-service/**'
      - '.github/workflows/build-gatekeeper-image.yml'
    tags:
      - 'accessgate-*'
      - 'v*'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'scripts/gatekeeper.mjs'
      - 'deploy/entrypoint.sh'
      - 'asset-service/**'
      - '.github/workflows/build-gatekeeper-image.yml'
  workflow_dispatch:

permissions: {}

jobs:
  smoke-test:
    name: Build + smoke-test combined image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate sources (node / python / shell)
        run: |
          node --check scripts/gatekeeper.mjs
          python3 -m py_compile asset-service/serve.py asset-service/src/lsl_pipeline/*.py
          sh -n deploy/entrypoint.sh

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build combined image (load locally, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: lsl-combined:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — both services come up
        run: |
          set -euo pipefail
          # Minimal runtime config: the gatekeeper requires LSL_ACCESS_GATE_ADDRESS (the real, public
          # mainnet gate). /health needs no RPC, so no network/secrets are involved.
          docker run -d --name lsl -p 8088:8088 \
            -e LSL_ACCESS_GATE_ADDRESS=0x14c129b8D22491a2cCE9Be36137eC8d9B9b31Db5 \
            -e GATE_SESSION_SECRET=ci-smoke \
            lsl-combined:ci

          echo "waiting for gatekeeper /health on :8088 ..."
          up=0
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8088/health >/dev/null; then up=1; break; fi
            sleep 1
          done
          if [ "$up" != 1 ]; then
            echo "::error::gatekeeper /health never came up"; docker logs lsl; docker rm -f lsl; exit 1
          fi
          echo "gatekeeper: $(curl -s http://127.0.0.1:8088/health)"

          # The asset service binds container-loopback :8090 (never published). Probe it from INSIDE
          # the container using the node runtime that's already present.
          echo "checking asset service /health on container loopback :8090 ..."
          docker exec lsl node -e "fetch('http://127.0.0.1:8090/health').then(r=>r.ok?r.text():Promise.reject('status '+r.status)).then(t=>console.log('asset:',t)).catch(e=>{console.error('asset service down:',e);process.exit(1)})"

          docker rm -f lsl
          echo "✅ combined image builds and both services start"

  build-push:
    name: Build and push
    needs: smoke-test
    if: github.event_name != 'pull_request'   # never publish from a PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # required for GCP Workload Identity Federation
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP (Workload Identity Federation)
        id: gcpauth
        if: vars.GCP_WIF_PROVIDER != ''
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        if: vars.GCP_WIF_PROVIDER != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_AR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcpauth.outputs.access_token }}

      - name: Compute image list (GHCR always; Artifact Registry when configured)
        id: images
        run: |
          {
            echo 'list<<EOF'
            echo "ghcr.io/${{ github.repository_owner }}/lsl-gatekeeper"
            if [ -n "${{ vars.GCP_WIF_PROVIDER }}" ]; then
              echo "${{ vars.GCP_AR_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.GCP_AR_REPO }}/lsl-gatekeeper"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
