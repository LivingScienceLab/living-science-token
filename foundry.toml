[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# Allow the distribution script to read its JSON config (scoped to those files only).
fs_permissions = [
    { access = "read", path = "./distribution.json" },
    { access = "read", path = "./distribution.example.json" },
]
# Verify deployed bytecode against source on Etherscan after deploy.
# Set ETHERSCAN_API_KEY in your environment to enable `--verify`.

[profile.default.fuzz]
runs = 256

# RPC endpoints are read from environment variables so no secrets are committed.
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
# `chain` is required so Foundry sends `chainid` to the Etherscan V2 API.
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
